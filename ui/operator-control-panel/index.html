<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Poverty Killer Operator Control Panel</title>
    <link rel="stylesheet" href="styles.css?v=operator-activation-e2e-ai5-20260602">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">PK</div>
          <div>
            <div>POVERTY KILLER</div>
            <div class="muted mono">operator panel / activation path verified</div>
          </div>
        </div>
        <div class="status-strip" aria-label="global runtime status"></div>
        <div class="top-actions">
          <button class="intent-button paper" disabled>Snapshot intent - disabled</button>
          <button class="intent-button live" disabled>Live locked</button>
        </div>
      </header>

      <nav class="nav" aria-label="operator control panel navigation"></nav>
      <main class="main" aria-live="polite"></main>
      <aside class="rail" aria-label="current alerts and dominant blockers"></aside>
    </div>
    <div class="ai-chief-global" aria-live="polite"></div>

    <script src="mock-data.js?v=operator-activation-e2e-ai5-20260602"></script>
    <script src="app.js?v=operator-activation-e2e-ai5-20260602"></script>
  </body>
</html>
