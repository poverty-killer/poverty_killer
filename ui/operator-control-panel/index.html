<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Poverty Killer Operator Cockpit</title>
    <link rel="icon" type="image/svg+xml" href="assets/poverty-killer-operator.svg">
    <link rel="alternate icon" href="assets/poverty-killer-operator.ico">
    <link rel="stylesheet" href="styles.css?v=operator-ui-build-ui4-enforce-unblock">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">PK</div>
          <div>
            <div>POVERTY KILLER</div>
            <div class="muted mono">operator cockpit / activation path verified</div>
          </div>
        </div>
        <div class="status-strip" aria-label="global runtime status"></div>
        <div class="top-actions">
          <div class="loading-control-status" role="status" aria-live="polite">Loading cockpit gates</div>
        </div>
      </header>

      <nav class="nav" aria-label="operator control panel navigation"></nav>
      <main class="main" aria-live="polite"></main>
      <aside class="rail" aria-label="current alerts and dominant blockers"></aside>
    </div>
    <div class="ai-chief-global" aria-live="polite"></div>

    <script src="mock-data.js?v=operator-ui-build-ui4-enforce-unblock"></script>
    <script src="app.js?v=operator-ui-build-ui4-enforce-unblock"></script>
  </body>
</html>
