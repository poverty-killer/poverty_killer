[pytest]
testpaths =
    tests
    app/world_awareness/tests
pythonpath = .
norecursedirs =
    .git
    .pytest_cache
    .pytest_tmp
    .phase_a_tmp
    __pycache__
    venv
    _repo_quarantine
markers =
    broker_read: requires explicit Board authorization for real broker read-only GET validation
    broker_access: requires explicit Board authorization for real broker access and any separate mutation approval
